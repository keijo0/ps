monitor.alsa.rules = [
  {
    matches = [ { node.name = "~alsa_output.pci.*" } ]
    actions = {
      update-props = {
        audio.format     = "S32LE"
        audio.rate       = 96000
        audio.channels   = 2
        resample.quality = 10
        resample.disable = false
      }
    }
  }
]
